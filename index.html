<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>log4n :: home</title>
<style>
  :root {
    --salmon: #FA8072;
    --salmon-dark: #e8604f;
    --salmon-light: #fdb8b0;
    --cream: #fff8f5;
    --ink: #2a1a17;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: Verdana, Geneva, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  a { color: var(--salmon-dark); text-decoration: underline; }
  a:hover { color: var(--ink); }

  .site-header {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem 0.5rem;
  }

  .banner {
    background: var(--salmon-light);
    border: 1px solid var(--salmon-dark);
    text-align: center;
    padding: 1.5rem 1rem;
    margin-bottom: 0.75rem;
  }

  .site-title {
    font-size: 1.8rem;
    font-weight: bold;
    margin: 0;
    color: var(--salmon-dark);
  }

  .site-subtitle {
    margin: 0.25rem 0 0;
    font-size: 0.85rem;
    color: var(--ink);
  }

  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 0.5rem 1.5rem 3rem;
  }

  .panel {
    background: #ffffff;
    border: 1px solid var(--salmon-light);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .panel h2 {
    font-size: 1.1rem;
    font-weight: bold;
    margin: 0 0 0.6rem;
    color: var(--salmon-dark);
    border-bottom: 1px solid var(--salmon-light);
    padding-bottom: 0.4rem;
  }

  .panel p {
    line-height: 1.6;
    font-size: 0.9rem;
    margin: 0 0 0.75rem;
  }

  .play-btn {
    display: inline-block;
    background: var(--salmon);
    color: var(--cream);
    border: 1px solid var(--salmon-dark);
    font-weight: bold;
    font-size: 0.85rem;
    text-decoration: none;
    padding: 0.5rem 1rem;
  }

  .play-btn:hover {
    background: var(--salmon-dark);
    color: var(--cream);
  }

  .page-view { display: none; }
  .page-view.active { display: block; }

  /* ---- slide-out tab panel ---- */

  .tab-toggle {
    position: fixed;
    top: 1.25rem;
    right: 1.25rem;
    z-index: 50;
    background: var(--salmon);
    color: var(--cream);
    border: 1px solid var(--salmon-dark);
    font-family: Verdana, Geneva, sans-serif;
    font-size: 0.85rem;
    font-weight: bold;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
  }

  .tab-toggle:hover { background: var(--salmon-dark); }

  .tab-drawer {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: 200px;
    background: var(--cream);
    border-left: 1px solid var(--salmon-dark);
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 40;
    padding: 4.5rem 1.25rem 1.5rem;
  }

  .tab-drawer.open { transform: translateX(0); }

  .tab-drawer nav {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .tab-link {
    font-family: Verdana, Geneva, sans-serif;
    font-size: 0.85rem;
    text-decoration: none;
    color: var(--ink);
    padding: 0.45rem 0.65rem;
    border: 1px solid transparent;
    cursor: pointer;
    text-align: left;
    background: none;
  }

  .tab-link:hover {
    border-color: var(--salmon-light);
    background: #ffffff;
  }

  .tab-link.active {
    background: var(--salmon-light);
    color: var(--ink);
    border-color: var(--salmon);
  }

  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(42, 26, 23, 0.15);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .drawer-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  footer {
    max-width: 720px;
    margin: 0 auto;
    padding: 1rem 1.5rem 3rem;
    font-size: 0.8rem;
    opacity: 0.6;
  }
</style>
</head>
<body>

<button class="tab-toggle" id="tabToggle" aria-label="open menu">menu</button>
<div class="drawer-overlay" id="drawerOverlay"></div>

<div class="tab-drawer" id="tabDrawer">
  <nav>
    <button class="tab-link active" data-page="home">home</button>
    <button class="tab-link" data-page="games">games</button>
    <!-- add more tabs here later, just copy a button line above
         and a matching .page-view section below -->
  </nav>
</div>

<header class="site-header">
  <div class="banner">
    <p class="site-title">log4n</p>
    <p class="site-subtitle">my website :)</p>
  </div>
</header>

<main>

  <section class="page-view active" id="page-home">
    <div class="panel">
      <h2>welcome</h2>
      <p>errrr heloooo</p>
      <p></p>
    </div>
  </section>

  <section class="page-view" id="page-games">
    <div class="panel">
      <h2>games</h2>
      <p>City Guesser</p>
      <a href="game.html" class="play-btn">play &rarr;</a>
    </div>
  </section>

</main>



<script src="oneko.js"></script>

<script>
  const tabToggle = document.getElementById('tabToggle');
  const tabDrawer = document.getElementById('tabDrawer');
  const drawerOverlay = document.getElementById('drawerOverlay');
  const tabLinks = document.querySelectorAll('.tab-link');
  const pageViews = document.querySelectorAll('.page-view');

  function closeDrawer() {
    tabDrawer.classList.remove('open');
    drawerOverlay.classList.remove('open');
  }

  tabToggle.addEventListener('click', () => {
    tabDrawer.classList.toggle('open');
    drawerOverlay.classList.toggle('open');
  });

  drawerOverlay.addEventListener('click', closeDrawer);

  tabLinks.forEach(link => {
    link.addEventListener('click', () => {
      const target = link.dataset.page;

      tabLinks.forEach(l => l.classList.remove('active'));
      link.classList.add('active');

      pageViews.forEach(view => {
        view.classList.toggle('active', view.id === 'page-' + target);
      });

      closeDrawer();
    });
  });
</script>

</body>
</html>
